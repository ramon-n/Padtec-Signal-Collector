<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padtec Auditor v4.0 - Trecho TUDDO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fb923c;
            --secondary: #6366f1;
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.9);
            --text: #f8fafc;
            --accent: #22c55e;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { margin: 0; font-size: 2.5rem; background: linear-gradient(to right, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .version { color: var(--primary); font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #94a3b8; }
        .tab:hover { background: rgba(255,255,255,0.05); }
        .tab.active { background: var(--primary); color: white; font-weight: 600; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.8rem; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { background: #ea580c; transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Path View */
        .path-viz { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .node-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 4px solid var(--secondary);
        }
        .node-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .node-name { font-weight: 600; color: var(--secondary); }
        .node-ip { font-size: 0.8rem; color: #64748b; }

        .param-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .param-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; text-align: center; }
        .param-label { font-size: 0.7rem; color: #94a3b8; margin-bottom: 3px; }
        .param-value { font-size: 1rem; font-weight: bold; color: var(--primary); }
        
        #console { background: #000; color: #22c55e; padding: 15px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; height: 150px; overflow-y: auto; border: 1px solid #1e293b; margin-top: 20px; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-online { background-color: var(--accent); }
        .status-offline { background-color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="version">V4.0 - OPTICAL AUDITOR</div>
            <h1>Padtec Path Monitor</h1>
        </div>

        <div class="tabs">
            <div class="tab" onclick="switchMode('single')">Nó Único</div>
            <div class="tab active" onclick="switchMode('path')">Trecho TUDDO</div>
        </div>

        <div class="card">
            <div class="input-grid">
                <div><label>Usuário</label><input type="text" id="user" value="acesso"></div>
                <div><label>Senha</label><input type="password" id="pass" value="r2riBoh8M23D"></div>
                <div style="display: flex; align-items: flex-end;"><button id="btnAction" onclick="startAudit()">Auditar Trecho</button></div>
            </div>
            
            <div id="pathView" class="path-viz">
                <div style="text-align: center; color: #64748b; padding: 40px;">Selecione o modo e inicie a coleta para ver os dados do trecho.</div>
            </div>
        </div>

        <div id="console">
            <div style="color: #64748b; margin-bottom: 5px;">> Console de Auditoria</div>
            <div id="logContent"></div>
        </div>
    </div>

    <script>
        let mode = 'path';

        function switchMode(m) {
            mode = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('btnAction').innerText = m === 'single' ? 'Coletar Nó' : 'Auditar Trecho';
            
            if (m === 'single') {
                document.getElementById('pathView').innerHTML = `
                    <div class="input-grid">
                        <div style="grid-column: span 3;"><label>IP do Equipamento</label><input type="text" id="singleIp" value="10.144.198.10"></div>
                    </div>
                `;
            } else {
                document.getElementById('pathView').innerHTML = '<div style="text-align: center; color: #64748b; padding: 40px;">Pronto para auditar a rota DWDM TUDDO.</div>';
            }
        }

        function log(m, type = '') {
            const l = document.getElementById('logContent');
            const d = document.createElement('div');
            d.style.color = type === 'err' ? '#ef4444' : (type === 'success' ? '#22c55e' : '#22c55e');
            d.innerText = `[${new Date().toLocaleTimeString()}] ${m}`;
            l.appendChild(d);
            document.getElementById('console').scrollTop = l.scrollHeight;
        }

        async function startAudit() {
            const btn = document.getElementById('btnAction');
            btn.disabled = true;
            document.getElementById('logContent').innerHTML = '';
            document.getElementById('pathView').innerHTML = '<div style="text-align: center; padding: 40px;">🌀 Coletando dados do trecho...</div>';
            
            const payload = {
                user: document.getElementById('user').value,
                pass: document.getElementById('pass').value,
                path_name: 'TUDDO'
            };

            const endpoint = mode === 'single' ? '/collect' : '/collect_path';
            if (mode === 'single') payload.url = document.getElementById('singleIp').value;

            try {
                log(`Iniciando ${mode === 'single' ? 'coleta de nó' : 'auditoria do trecho TUDDO'}...`);
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const out = await res.json();

                if (out.status === 'success') {
                    log("Sucesso na auditoria!", "success");
                    renderResults(mode === 'single' ? [out] : out.data);
                } else {
                    log("ERRO: " + out.message, "err");
                    document.getElementById('pathView').innerHTML = `<div style="color: #ef4444; text-align: center; padding: 20px;">${out.message}</div>`;
                }
            } catch (err) {
                log("FALHA DE REDE: " + err.message, "err");
            } finally {
                btn.disabled = false;
            }
        }

        function renderResults(nodes) {
            const view = document.getElementById('pathView');
            view.innerHTML = '';
            
            nodes.forEach(node => {
                const card = document.createElement('div');
                card.className = 'node-card';
                
                let contentHtml = '';
                
                if (node.status === 'error') {
                    // Caso o nó individual tenha falhado
                    card.style.borderLeftColor = '#ef4444';
                    contentHtml = `
                        <div style="color: #ef4444; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; font-size: 0.85rem;">
                            <strong>Falha na Coleta:</strong> ${node.message || 'Sem resposta do equipamento'}
                        </div>
                    `;
                } else if (node.lines) {
                    // Caso de sucesso com dados
                    contentHtml = Object.entries(node.lines).map(([label, params]) => `
                        <div style="margin-top: 10px;">
                            <div style="font-size: 0.8rem; font-weight: bold; color: var(--primary); margin-bottom: 5px;">${label}</div>
                            <div class="param-grid">
                                <div class="param-item"><div class="param-label">Pin</div><div class="param-value">${params.Pin}</div></div>
                                <div class="param-item"><div class="param-label">OSNR</div><div class="param-value">${params.OSNR}</div></div>
                                <div class="param-item"><div class="param-label">Fator Q</div><div class="param-value">${params.Fator_Q || params['Fator Q'] || 'N/A'}</div></div>
                                <div class="param-item"><div class="param-label">Modo</div><div class="param-value" style="font-size: 0.73rem;">${params.Modo}</div></div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    contentHtml = '<div style="color: #64748b;">Dados indisponíveis para este nó.</div>';
                }

                card.innerHTML = `
                    <div class="node-header">
                        <div>
                            <span class="status-dot ${node.status === 'success' ? 'status-online' : 'status-offline'}"></span>
                            <span class="node-name">${node.node_name || node.equipment || 'Nó Desconhecido'}</span>
                        </div>
                        <span class="node-ip">${node.timestamp ? node.timestamp.split('T')[1].split('.')[0] : '--:--'}</span>
                    </div>
                    ${contentHtml}
                `;
                view.appendChild(card);
            });
        }
    </script>
</body>
</html>
